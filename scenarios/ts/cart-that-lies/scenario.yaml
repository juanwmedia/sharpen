# Mechanics document (schema 2): setup as steps, checks as predicates.
setup:
  - write:
      path: src/cart.ts
      content: |
        export type Line = { priceCents: number; qty: number }
        
        export function cartTotal(lines: Line[]): number {
          // qty is ignored. That is the bug, not a feature.
          return lines.reduce((sum, line) => sum + line.priceCents, 0)
        }

checks:
  - name:
      en: "exports cartTotal"
      es: "exporta cartTotal"
    expect:
      exports:
        entry: "src/cart.ts"
        export: "cartTotal"

  - name:
      en: "two lines with qty total 350"
      es: "dos líneas con qty suman 350"
    expect:
      returns:
        entry: "src/cart.ts"
        export: "cartTotal"
        args: [[{"priceCents":100,"qty":2},{"priceCents":50,"qty":3}]]
        equals: 350

  - name:
      en: "empty cart is 0"
      es: "carrito vacío es 0"
    expect:
      returns:
        entry: "src/cart.ts"
        export: "cartTotal"
        args: [[]]
        equals: 0

