# Mechanics document (schema 2): setup as steps, checks as predicates.
setup:
  - write:
      path: src/pipeline.ts
      content: |
        export function parse(raw: string): string {
          return raw.trim()
        }
        
        export function validate(s: string): string | null {
          return /^\d+$/.test(s) ? s : null
        }
        
        export function format(s: string): string {
          return 'VAL:' + s
        }
        
        export function processInput(raw: string): string | null {
          // Skips validate. Garbage in, garbage proudly out.
          const s = parse(raw)
          return format(s)
        }

checks:
  - name:
      en: "exports processInput"
      es: "exporta processInput"
    expect:
      exports:
        entry: "src/pipeline.ts"
        export: "processInput"

  - name:
      en: "valid input formats"
      es: "input válido formatea"
    expect:
      returns:
        entry: "src/pipeline.ts"
        export: "processInput"
        args: ["  42  "]
        equals: "VAL:42"

  - name:
      en: "invalid input is null"
      es: "input inválido es null"
    expect:
      returns:
        entry: "src/pipeline.ts"
        export: "processInput"
        args: ["nope"]
        equals: null

# Machine proof of solvability: the dry-run validator replays these commands
# and every check must go green. Never shown to the player.
solution:
  commands:
    - writefile src/pipeline.ts b64:
